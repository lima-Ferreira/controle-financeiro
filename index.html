<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Ultra | Final Pro</title>
    <style>
        :root {
            --bg: #0b111e;
            --card: #161d2f;
            --text: #f3f4f6;
            --accent: #10b981;
            --danger: #ef4444;
            --border: #2d3748;
            --top2: #f97316;
            --top3: #fbbf24;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        h2 {
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* Gráfico de Círculo Nativo */
        .chart-svg-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 180px;
            margin: 15px 0;
        }

        svg {
            transform: rotate(-90deg);
        }

        circle {
            fill: none;
            stroke-width: 10;
            transition: all 0.5s ease;
            stroke-dasharray: 251.2;
        }

        .bg-circle {
            stroke: var(--accent);
        }

        .resumo {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            text-align: center;
        }

        .resumo-item {
            background: #0b111e;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .resumo-item small {
            font-size: 0.55rem;
            color: #94a3b8;
            display: block;
        }

        input,
        select,
        button {
            background: #0b111e;
            border: 1px solid var(--border);
            color: white;
            padding: 14px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 12px;
            font-size: 1rem;
            outline: none;
        }

        button {
            background: var(--accent);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        .history {
            max-height: 400px;
            overflow-y: auto;
        }

        .t-row {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.02);
            align-items: center;
            border-left: 4px solid #475569;
        }

        /* CORES DO RANKING */
        .txt-in {
            color: var(--accent) !important;
        }

        .txt-top1 {
            color: var(--danger) !important;
            font-weight: 900;
        }

        .txt-top2 {
            color: var(--top2) !important;
            font-weight: 700;
        }

        .txt-top3 {
            color: var(--top3) !important;
            font-weight: 700;
        }

        .btn-del {
            background: none;
            border: none;
            color: #475569;
            cursor: pointer;
            font-size: 1.2rem;
            width: auto;
            padding: 0 10px;
        }

        .btn-export {
            background: #2d3748;
            color: white;
            margin-top: 20px;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div class="container">
        <header style="text-align:center; margin-bottom: 20px;">
            <h1 style="font-weight:200; letter-spacing:4px; font-size: 1.5rem;">EMERALD <b
                    style="color:var(--accent)">ULTRA</b></h1>
        </header>

        <div class="grid">
            <div class="card">
                <h2>Lançamento</h2>
                <form id="finForm">
                    <input type="text" id="desc" placeholder="Descrição" required>
                    <input type="number" id="valor" placeholder="Valor R$" step="0.01" required>
                    <input type="date" id="data" required>
                    <select id="tipo">
                        <option value="in">Receita (+)</option>
                        <option value="out">Despesa (-)</option>
                    </select>
                    <button type="submit">SALVAR NO FLUXO</button>
                </form>
            </div>

            <div class="card">
                <h2>Dashboard</h2>
                <div class="chart-svg-container">
                    <svg width="160" height="160" viewBox="0 0 100 100">
                        <circle class="bg-circle" cx="50" cy="50" r="40"></circle>
                        <circle id="c-top1" cx="50" cy="50" r="40" stroke="var(--danger)" stroke-dashoffset="251.2">
                        </circle>
                        <circle id="c-top2" cx="50" cy="50" r="40" stroke="var(--top2)" stroke-dashoffset="251.2">
                        </circle>
                        <circle id="c-top3" cx="50" cy="50" r="40" stroke="var(--top3)" stroke-dashoffset="251.2">
                        </circle>
                    </svg>
                    <div style="position: absolute; text-align: center;">
                        <small style="color:#94a3b8; font-size: 0.6rem;">SALDO</small>
                        <b id="res-bal" style="display: block; font-size: 0.9rem;">R$ 0</b>
                    </div>
                </div>
                <div class="resumo">
                    <div class="resumo-item"><small>RECEITAS</small><b id="res-in">R$ 0</b></div>
                    <div class="resumo-item"><small>DESPESAS</small><b id="res-out">R$ 0</b></div>
                </div>
            </div>

            <div class="card">
                <h2>Top 3 & Histórico</h2>
                <div id="history" class="history"></div>
                <button class="btn-export" onclick="exportarLista()">EXPORTAR LISTA (TXT)</button>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('emerald_ultra_final_v10')) || [];

        function setDate() {
            const input = document.getElementById('data');
            const hoje = new Date();
            const ano = hoje.getFullYear();
            const mes = String(hoje.getMonth() + 1).padStart(2, '0');
            const dia = String(hoje.getDate()).padStart(2, '0');
            input.value = `${ano}-${mes}-${dia}`;
        }

        function update() {
            const incomes = db.filter(t => t.tipo === 'in').reduce((acc, t) => acc + (Number(t.valor) || 0), 0);
            const expenses = db.filter(t => t.tipo === 'out').reduce((acc, t) => acc + (Number(t.valor) || 0), 0);

            const fmt = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('res-bal').innerText = fmt(incomes - expenses);
            document.getElementById('res-in').innerText = fmt(incomes);
            document.getElementById('res-out').innerText = fmt(expenses);

            atualizarCirculo(incomes, expenses);
            renderList();
        }

        function atualizarCirculo(totalIn, totalOut) {
            const circ = 251.2;
            const totalRef = totalIn > 0 ? totalIn : (totalOut || 1);
            const top3 = db.filter(t => t.tipo === 'out').sort((a, b) => b.valor - a.valor).slice(0, 3);
            let acumulado = 0;
            ['c-top1', 'c-top2', 'c-top3'].forEach((id, idx) => {
                const circle = document.getElementById(id);
                if (top3[idx]) {
                    const fatia = (top3[idx].valor / totalRef) * circ;
                    circle.style.strokeDasharray = `${fatia} ${circ}`;
                    circle.style.strokeDashoffset = -acumulado;
                    acumulado += fatia;
                } else {
                    circle.style.strokeDasharray = `0 ${circ}`;
                }
            });
        }

        function renderList() {
            const container = document.getElementById('history');
            const top3 = db.filter(t => t.tipo === 'out').sort((a, b) => b.valor - a.valor).slice(0, 3);

            container.innerHTML = db.sort((a, b) => new Date(b.data) - new Date(a.data)).map((item, idx) => {
                let colorClass = '';
                if (item.tipo === 'in') colorClass = 'txt-in';
                else {
                    if (top3[0] && item.valor === top3[0].valor) colorClass = 'txt-top1';
                    else if (top3[1] && item.valor === top3[1].valor) colorClass = 'txt-top2';
                    else if (top3[2] && item.valor === top3[2].valor) colorClass = 'txt-top3';
                }

                return `
            <div class="t-row" style="border-left-color: ${item.tipo === 'in' ? 'var(--accent)' : 'var(--danger)'}">
                <div>
                    <b class="${colorClass}">${item.desc}</b>
                    <small style="display:block;color:#64748b">${item.data.split('-').reverse().join('/')}</small>
                </div>
                <div style="display:flex;align-items:center">
                    <span style="font-weight:bold; color: ${item.tipo === 'in' ? 'var(--accent)' : 'var(--danger)'}">
                        R$ ${Number(item.valor).toFixed(2)}
                    </span>
                    <button class="btn-del" onclick="del(${idx})">&times;</button>
                </div>
            </div>`;
            }).join('');
        }

        function del(idx) {
            if (confirm("Excluir?")) {
                db.splice(idx, 1);
                localStorage.setItem('emerald_ultra_final_v10', JSON.stringify(db));
                update();
            }
        }

        function exportarLista() {
            if (db.length === 0) return alert("Nada para exportar.");
            let txt = "EXTRATO FINANCEIRO EMERALD\n\n";
            db.sort((a, b) => new Date(b.data) - new Date(a.data)).forEach(i => {
                txt += `${i.data.split('-').reverse().join('/')} | ${i.desc.padEnd(20)} | ${i.tipo === 'in' ? '+' : '-'} R$ ${Number(i.valor).toFixed(2)}\n`;
            });
            const blob = new Blob([txt], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "extrato_financeiro.txt";
            a.click();
        }

        document.getElementById('finForm').onsubmit = function (e) {
            e.preventDefault();
            const descInput = document.getElementById('desc');
            const valorInput = document.getElementById('valor');
            db.push({
                desc: descInput.value,
                valor: parseFloat(valorInput.value),
                data: document.getElementById('data').value,
                tipo: document.getElementById('tipo').value
            });
            localStorage.setItem('emerald_ultra_final_v10', JSON.stringify(db));
            update();
            descInput.value = '';
            valorInput.value = '';
            setDate();
        };

        window.onload = () => { setDate(); update(); };
    </script>
</body>

</html>
