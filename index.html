<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Ultra | Ranking Financeiro</title>
    <style>
        :root {
            --bg: #0b111e;
            --card: #161d2f;
            --text: #f3f4f6;
            --accent: #10b981;
            --danger: #ef4444;
            --border: #2d3748;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h2 {
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* KPIs e Gráfico */
        .resumo {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .resumo-item {
            background: #0b111e;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .resumo-item small {
            font-size: 0.6rem;
            color: #94a3b8;
            display: block;
        }

        .resumo-item b {
            font-size: 0.9rem;
        }

        .chart-container {
            height: 100px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding: 10px;
            background: #0b111e;
            border-radius: 8px;
        }

        .bar {
            flex: 1;
            border-radius: 4px;
            transition: 0.5s;
            min-height: 2px;
        }

        .bar-in {
            background: var(--accent);
        }

        .bar-out {
            background: var(--danger);
        }

        /* Form */
        input,
        select,
        button {
            background: #0b111e;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        button {
            background: var(--accent);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border: none;
            margin-top: 5px;
        }

        /* Histórico e Ranking */
        .history {
            max-height: 450px;
            overflow-y: auto;
        }

        .t-row {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.02);
            align-items: center;
            border-left: 5px solid transparent;
            transition: 0.3s;
        }

        .t-row.in {
            border-left-color: var(--accent);
        }

        .t-row.out {
            border-left-color: var(--danger);
        }

        /* Estilos do Top 3 */
        .top-1 {
            background: rgba(239, 68, 68, 0.25) !important;
            border: 1px solid gold;
        }

        .top-2 {
            background: rgba(239, 68, 68, 0.15) !important;
            border: 1px solid silver;
        }

        .top-3 {
            background: rgba(239, 68, 68, 0.10) !important;
            border: 1px solid #cd7f32;
        }

        .badge {
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
        }

        .btn-del {
            background: none;
            border: none;
            color: #475569;
            cursor: pointer;
            padding: 0 10px;
            font-size: 1rem;
        }

        .btn-del:hover {
            color: var(--danger);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1 style="text-align:center; font-weight:200; letter-spacing:5px;">CONTROLE <b
                style="color:var(--accent)">FINANCEIRO</b></h1>

        <div class="grid">
            <div class="card">
                <h2>Lançamento</h2>
                <form id="finForm">
                    <input type="text" id="desc" placeholder="Descrição" required>
                    <input type="number" id="valor" placeholder="Valor R$" step="0.01" required>
                    <input type="date" id="data" required>
                    <select id="tipo">
                        <option value="in">Receita (+)</option>
                        <option value="out">Despesa (-)</option>
                    </select>
                    <button type="submit">SALVAR NO FLUXO</button>
                </form>
            </div>

            <div class="card">
                <h2>Resumo e Gráfico</h2>
                <div class="resumo">
                    <div class="resumo-item"><small>SALDO</small><b id="res-bal">R$ 0</b></div>
                    <div class="resumo-item"><small>RECEITAS</small><b id="res-in">R$ 0</b></div>
                    <div class="resumo-item"><small>DESPESAS</small><b id="res-out">R$ 0</b></div>
                </div>
                <div class="chart-container">
                    <div id="bar-in" class="bar bar-in" style="height: 0%"></div>
                    <div id="bar-out" class="bar bar-out" style="height: 0%"></div>
                </div>
            </div>

            <div class="card">
                <h2>Top 3 Maiores Despesas</h2>
                <div id="history" class="history"></div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('emerald_ranking_db')) || [];

        // DATA ATUAL BLINDADA (GMT-3 para não dar erro de fuso)
        function setDate() {
            const input = document.getElementById('data');
            const hoje = new Date();
            const ano = hoje.getFullYear();
            const mes = String(hoje.getMonth() + 1).padStart(2, '0');
            const dia = String(hoje.getDate()).padStart(2, '0');
            input.value = `${ano}-${mes}-${dia}`;
        }

        function update() {
            const incomes = db.filter(t => t.tipo === 'in').reduce((acc, t) => acc + t.valor, 0);
            const expenses = db.filter(t => t.tipo === 'out').reduce((acc, t) => acc + t.valor, 0);

            const fmt = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('res-bal').innerText = fmt(incomes - expenses);
            document.getElementById('res-in').innerText = fmt(incomes);
            document.getElementById('res-out').innerText = fmt(expenses);

            const max = Math.max(incomes, expenses) || 1;
            document.getElementById('bar-in').style.height = (incomes / max * 100) + '%';
            document.getElementById('bar-out').style.height = (expenses / max * 100) + '%';

            renderList();
        }

        function renderList() {
            const container = document.getElementById('history');

            // Lógica do Ranking: Pega as 3 maiores despesas únicas
            const despesasOrdenadas = db
                .filter(t => t.tipo === 'out')
                .sort((a, b) => b.valor - a.valor)
                .slice(0, 3);

            container.innerHTML = db.sort((a, b) => new Date(b.data) - new Date(a.data)).map((item, idx) => {
                let rankClass = '';
                let medalha = '';

                if (item.tipo === 'out' && db.filter(t => t.tipo === 'out').length > 0) {
                    if (item === despesasOrdenadas[0]) { rankClass = 'top-1'; medalha = '🥇'; }
                    else if (item === despesasOrdenadas[1]) { rankClass = 'top-2'; medalha = '🥈'; }
                    else if (item === despesasOrdenadas[2]) { rankClass = 'top-3'; medalha = '🥉'; }
                }

                return `
                <div class="t-row ${item.tipo} ${rankClass}">
                    <div>
                        <b style="font-size:0.85rem">${medalha} ${item.desc}</b>
                        <small style="display:block; color:#64748b">${item.data.split('-').reverse().join('/')}</small>
                    </div>
                    <div style="display:flex; align-items:center">
                        <span style="font-weight:bold; color: ${item.tipo === 'in' ? '#10b981' : '#ef4444'}">
                            R$ ${item.valor.toFixed(2)}
                        </span>
                        <button class="btn-del" onclick="del(${idx})">✖</button>
                    </div>
                </div>
            `;
            }).join('');
        }

        function del(idx) {
            if (confirm("Excluir registro?")) {
                db.splice(idx, 1);
                localStorage.setItem('emerald_ranking_db', JSON.stringify(db));
                update();
            }
        }

        document.getElementById('finForm').onsubmit = function (e) {
            e.preventDefault();
            db.push({
                desc: document.getElementById('desc').value,
                valor: parseFloat(document.getElementById('valor').value),
                data: document.getElementById('data').value,
                tipo: document.getElementById('tipo').value
            });
            localStorage.setItem('emerald_ranking_db', JSON.stringify(db));
            update();
            document.getElementById('desc').value = '';
            document.getElementById('valor').value = '';
            setDate(); // Força a data a voltar para hoje
        };

        window.onload = () => {
            setDate();
            update();
        };
    </script>
</body>

</html>
