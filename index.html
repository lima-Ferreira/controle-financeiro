<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Ultra | Final Pro</title>
    <style>
        :root {
            --bg: #0b111e;
            --card: #161d2f;
            --text: #f3f4f6;
            --accent: #10b981;
            --danger: #ef4444;
            --border: #2d3748;
            --top2: #f97316;
            --top3: #fbbf24;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 1080px;
            margin: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        h2 {
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .chart-svg-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 180px;
            margin: 15px 0;
        }

        svg {
            transform: rotate(-90deg);
        }

        circle {
            fill: none;
            stroke-width: 14;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            stroke-dasharray: 251.2;
        }

        /* Fundo do círculo agora é a cor de borda (vazio) */
        .bg-circle {
            stroke: var(--border);
        }

        /* Círculo da Receita (Verde) */
        #c-receita {
            stroke: var(--accent);
            stroke-dashoffset: 251.2;
        }

        .resumo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            text-align: center;
        }

        .resumo-item {
            background: #0b111e;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .resumo-item small {
            font-size: 0.55rem;
            color: #94a3b8;
            display: block;
        }

        input,
        select,
        button {
            background: #0b111e;
            border: 1px solid var(--border);
            color: white;
            padding: 14px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 12px;
            font-size: 1rem;
            outline: none;
        }

        button {
            background: var(--accent);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        .btn-reset {
            background: var(--danger);
            color: white;
            font-size: 0.7rem;
            margin-top: 5px;
        }

        .history {
            max-height: 400px;
            overflow-y: auto;
        }

        .t-row {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.02);
            align-items: center;
            border-left: 4px solid #475569;
        }

        .txt-in {
            color: var(--accent) !important;
        }

        .txt-top1 {
            color: var(--danger) !important;
            font-weight: 900;
        }

        .txt-top2 {
            color: var(--top2) !important;
            font-weight: 700;
        }

        .txt-top3 {
            color: var(--top3) !important;
            font-weight: 700;
        }

        .tag-card {
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--border);
            margin-left: 5px;
        }

        .btn-del {
            background: none;
            border: none;
            color: #475569;
            cursor: pointer;
            font-size: 1.2rem;
            width: auto;
            padding: 0 10px;
        }

        .btn-export {
            background: #2d3748;
            color: white;
            margin-top: 20px;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>

    <div class="container">


        <div class="grid">
            <div class="card">
                <h2>Lançamento</h2>
                <form id="finForm">
                    <input type="text" id="desc" placeholder="Descrição" required>
                    <input type="number" id="valor" placeholder="Valor R$" step="0.01" required>
                    <input type="date" id="data" required>
                    <select id="tipo">
                        <option value="in">Receita (+)</option>
                        <option value="out">Despesa (-)</option>
                    </select>
                    <select id="origem">
                        <option value="dinheiro">Saldo / Dinheiro</option>
                        <option value="nubank">Cartão Nubank</option>
                        <option value="digio">Cartão Digio</option>
                    </select>
                    <button type="submit">SALVAR NO FLUXO</button>
                    <button type="button" class="btn-reset" onclick="resetarSistema()">RESETAR SISTEMA</button>
                </form>
            </div>

            <div class="card">
                <h2>Dashboard</h2>
                <div class="chart-svg-container">
                    <svg width="160" height="160" viewBox="0 0 100 100">
                        <circle class="bg-circle" cx="50" cy="50" r="40"></circle>
                        <circle id="c-receita" cx="50" cy="50" r="40"></circle>
                        <circle id="c-top1" cx="50" cy="50" r="40" stroke="var(--danger)"></circle>
                        <circle id="c-top2" cx="50" cy="50" r="40" stroke="var(--top2)"></circle>
                        <circle id="c-top3" cx="50" cy="50" r="40" stroke="var(--top3)"></circle>
                    </svg>
                    <div style="position: absolute; text-align: center;">
                        <small style="color:#94a3b8; font-size: 0.6rem;">SALDO</small>
                        <b id="res-bal" style="display: block; font-size: 0.9rem;">R$ 0</b>
                    </div>
                </div>
                <div class="resumo">
                    <div class="resumo-item"><small>RECEITAS</small><b id="res-in">R$ 0</b></div>
                    <div class="resumo-item"><small>DESPESAS</small><b id="res-out">R$ 0</b></div>
                </div>
            </div>

            <div class="card">
                <h2>Top 3 & Histórico</h2>
                <div id="history" class="history"></div>
                <button class="btn-export" onclick="exportarLista()">EXPORTAR LISTA (TXT)</button>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('emerald_ultra_v12')) || [];

        function setDate() {
            const input = document.getElementById('data');
            const hoje = new Date();
            input.value = hoje.toISOString().split('T')[0];
        }

        function update() {
            const incomes = db.filter(t => t.tipo === 'in').reduce((acc, t) => acc + Number(t.valor), 0);
            const expenses = db.filter(t => t.tipo === 'out').reduce((acc, t) => acc + Number(t.valor), 0);

            const fmt = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('res-bal').innerText = fmt(incomes - expenses);
            document.getElementById('res-in').innerText = fmt(incomes);
            document.getElementById('res-out').innerText = fmt(expenses);

            localStorage.setItem('emerald_ultra_v12', JSON.stringify(db));
            atualizarCirculo(incomes, expenses);
            renderList();
        }

        function atualizarCirculo(totalIn, totalOut) {
            const circ = 251.2;
            const cRec = document.getElementById('c-receita');

            // 1. O círculo verde (receita) preenche proporcional ao saldo positivo
            if (totalIn > 0) {
                cRec.style.strokeDashoffset = 0; // Preenche tudo de verde
            } else {
                cRec.style.strokeDashoffset = circ; // Fica vazio se não houver receita
            }

            // 2. Lógica das despesas (Top 3) "comendo" o verde
            const top3Despesas = db.filter(t => t.tipo === 'out').sort((a, b) => b.valor - a.valor).slice(0, 3);
            const totalReferencia = totalIn > 0 ? totalIn : (totalOut || 1);

            let offsetAcumulado = 0;

            ['c-top1', 'c-top2', 'c-top3'].forEach((id, idx) => {
                const circle = document.getElementById(id);
                if (top3Despesas[idx] && totalIn > 0) {
                    const valorPorcentagem = (top3Despesas[idx].valor / totalReferencia) * circ;
                    circle.style.strokeDashoffset = circ - valorPorcentagem;
                    circle.style.transform = `rotate(${(offsetAcumulado / circ) * 360}deg)`;
                    circle.style.transformOrigin = "center";
                    offsetAcumulado += valorPorcentagem;
                } else {
                    circle.style.strokeDashoffset = circ;
                }
            });
        }

        function renderList() {
            const historyDiv = document.getElementById('history');
            const top3Ids = db.filter(t => t.tipo === 'out').sort((a, b) => b.valor - a.valor).slice(0, 3).map(t => t.id);

            historyDiv.innerHTML = db.slice().reverse().map(t => {
                let classeCor = t.tipo === 'in' ? 'txt-in' : '';
                if (t.tipo === 'out') {
                    const rank = top3Ids.indexOf(t.id);
                    if (rank === 0) classeCor = 'txt-top1';
                    else if (rank === 1) classeCor = 'txt-top2';
                    else if (rank === 2) classeCor = 'txt-top3';
                }

                const tagCartao = t.origem !== 'dinheiro' ? `<span class="tag-card">${t.origem.toUpperCase()}</span>` : '';

                return `
                    <div class="t-row" style="border-left-color: ${t.tipo === 'in' ? 'var(--accent)' : 'var(--danger)'}">
                        <div>
                            <div style="font-size:0.85rem">${t.desc} ${tagCartao}</div>
                            <small style="color:#64748b; font-size:0.7rem">${t.data.split('-').reverse().join('/')}</small>
                        </div>
                        <div style="display:flex; align-items:center">
                            <b class="${classeCor}">${t.tipo === 'in' ? '+' : '-'} R$ ${Number(t.valor).toFixed(2)}</b>
                            <button class="btn-del" onclick="deleteItem(${t.id})">×</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('finForm').onsubmit = (e) => {
            e.preventDefault();
            const newItem = {
                id: Date.now(),
                desc: document.getElementById('desc').value,
                valor: parseFloat(document.getElementById('valor').value),
                data: document.getElementById('data').value,
                tipo: document.getElementById('tipo').value,
                origem: document.getElementById('origem').value
            };
            db.push(newItem);

            setDate();
            update();
        };

        function deleteItem(id) {
            db = db.filter(t => t.id !== id);
            update();
        }

        function resetarSistema() {
            if (confirm("Deseja apagar todos os lançamentos?")) {
                db = [];
                update();
            }
        }

        function exportarLista() {
            const texto = db.map(t => `${t.data} | ${t.tipo.toUpperCase()} | ${t.origem.toUpperCase()} | ${t.desc}: R$ ${t.valor}`).join('\n');
            const blob = new Blob([texto], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'emerald_ultra_report.txt';
            link.click();
        }

        window.onload = () => { setDate(); update(); };
    </script>
</body>

</html>
